{% extends "base.html" %}
{% load i18n %}

{% block title %}{% trans "Login" %} - {{ block.super }}{% endblock %}

{% block content %}
<div class="container-custom py-16">
    <div class="max-w-md mx-auto bg-white rounded-xl shadow-md p-8">
        <div class="mb-6 text-center">
            {% if site_settings.logo %}
            <img src="{{ site_settings.logo.url }}" alt="{{ site_settings.site_name }}" class="mx-auto h-16 w-auto max-w-[220px] object-contain">
            {% elif site_settings.footer_logo %}
            <img src="{{ site_settings.footer_logo.url }}" alt="{{ site_settings.site_name }}" class="mx-auto h-16 w-16 rounded-full object-contain">
            {% endif %}
        </div>
        <h1 class="text-2xl font-bold text-center mb-6">{% trans "Login" %}</h1>
        <form method="post">
            {% csrf_token %}
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">{% trans "Username" %}</label>
                <input type="text" name="username" class="form-input" required>
            </div>
            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-700 mb-1">{% trans "Password" %}</label>
                <input type="password" name="password" class="form-input" required>
            </div>
            <button type="submit" class="btn-primary w-full justify-center">{% trans "Login" %}</button>
        </form>
    </div>
</div>
{% endblock %}
