{% load i18n static %}
<!DOCTYPE html>
<html lang="{{ LANGUAGE_CODE }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ site_settings.site_name|default:"The Ransom Evangelistic Centre" }}{% endblock %}</title>
    <meta name="description" content="{% block meta_description %}{% endblock %}">
    {% if site_settings.favicon %}<link rel="icon" href="{{ site_settings.favicon.url }}">{% endif %}
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: "#d39200",
                        "primary-dark": "#b87900",
                        ink: "#222222",
                        paper: "#f5f5f5",
                        "heading-blue": "#0b5f89"
                    },
                    fontFamily: {
                        serif: ["Georgia", "Cambria", "Times New Roman", "serif"],
                        sans: ["Inter", "Arial", "sans-serif"]
                    }
                }
            }
        }
    </script>
    <style>
        [x-cloak] { display: none !important; }
        .site-container { width: min(1180px, calc(100% - 2rem)); margin-inline: auto; }
        .newspaper-heading { font-family: Georgia, Cambria, "Times New Roman", serif; }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body class="bg-[#3d3a39] font-serif text-white antialiased">
    {% block content %}{% endblock %}
    {% block extra_scripts %}{% endblock %}
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</body>
</html>
