{% load i18n dashboard_tags %}
<div class="rounded-2xl border border-gray-200 bg-white p-5 shadow-sm transition hover:shadow-md">
    <div class="flex items-start justify-between gap-3">
        <div>
            <p class="text-xs font-bold uppercase tracking-wider text-gray-400">{{ label }}</p>
            <p class="mt-2 text-3xl font-bold {% if accent %}{{ accent }}{% else %}text-ink{% endif %}">{{ value }}</p>
            {% if subtitle %}<p class="mt-1 text-xs text-gray-500">{{ subtitle }}</p>{% endif %}
        </div>
        {% if icon %}
        <span class="flex h-10 w-10 items-center justify-center rounded-xl bg-primary/10 text-primary">
            {% dash_icon icon size_class="text-[22px]" %}
        </span>
        {% endif %}
    </div>
</div>
