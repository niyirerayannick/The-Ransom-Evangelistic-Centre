<article class="flex h-full flex-col overflow-hidden rounded-2xl border border-gray-100 bg-white shadow-sm transition hover:-translate-y-1 hover:shadow-soft">
    <div class="border-b border-primary/10 bg-gradient-to-br from-primary/10 to-paper px-6 py-5">
        <span class="text-3xl">{{ program.icon|default:"✦" }}</span>
        <h3 class="mt-3 text-2xl font-bold text-ink newspaper-heading">{{ program.title }}</h3>
    </div>
    <div class="flex flex-1 flex-col p-6">
        <div class="page-copy flex-1 text-sm leading-relaxed text-gray-600">{{ program.description|safe }}</div>
        <button type="button" @click="openDonateOptions('{{ program.program_key }}')" class="mt-6 inline-flex w-fit rounded-full bg-primary px-6 py-2.5 text-xs font-bold uppercase tracking-wider text-white transition hover:bg-primary-dark">
            {% if program.slug == "articles-writing" %}{{ donate_ui.donate_articles }}
            {% elif program.slug == "healing-activities" %}{{ donate_ui.donate_healing }}
            {% else %}{{ donate_ui.donate_now }}{% endif %}
        </button>
    </div>
</article>
