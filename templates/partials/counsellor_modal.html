{% load i18n %}
<div
    x-show="counsellorOpen"
    x-cloak
    @keydown.escape.window="closeCounsellor()"
    class="fixed inset-0 z-[120] flex items-center justify-center p-4"
    role="dialog"
    aria-modal="true"
    :aria-label="activeCounsellor ? activeCounsellor.name : '{% trans "Counsellor profile" %}'"
>
    <div class="absolute inset-0 bg-black/70" @click="closeCounsellor()"></div>

    <div
        x-show="counsellorOpen"
        x-transition
        class="relative flex max-h-[90vh] w-full max-w-3xl flex-col overflow-hidden rounded-2xl bg-white shadow-2xl"
        @click.stop
    >
        <button type="button" @click="closeCounsellor()" class="absolute right-4 top-4 z-10 flex h-10 w-10 items-center justify-center rounded-full bg-white/90 text-xl font-bold text-ink shadow hover:bg-primary hover:text-white" aria-label="{% trans 'Close' %}">x</button>

        <template x-if="activeCounsellor">
            <div class="overflow-y-auto">
                <div class="grid md:grid-cols-[280px_1fr]">
                    <div class="min-h-[280px] bg-gradient-to-br from-primary/10 to-paper md:min-h-full">
                        <img :src="activeCounsellor.photo_url" :alt="activeCounsellor.name" class="h-full w-full object-cover object-top" x-show="activeCounsellor.photo_url">
                        <div class="flex h-full min-h-[280px] items-center justify-center text-6xl font-bold text-primary/25 newspaper-heading" x-show="!activeCounsellor.photo_url" x-text="activeCounsellor.name ? activeCounsellor.name.charAt(0) : ''"></div>
                    </div>
                    <div class="p-6 sm:p-8">
                        <span class="text-[10px] font-bold uppercase tracking-[.2em] text-primary">{% trans "REC Counsellor" %}</span>
                        <h2 class="mt-2 text-3xl font-bold text-ink newspaper-heading" x-text="activeCounsellor.name"></h2>
                        <p class="mt-2 text-sm font-bold uppercase tracking-wider text-heading-blue" x-text="activeCounsellor.role"></p>
                        <div class="page-copy mt-5 text-sm leading-relaxed text-gray-600" x-html="activeCounsellor.bio_html"></div>

                        <div class="mt-6 space-y-2 text-sm text-gray-600" x-show="activeCounsellor.phone || activeCounsellor.email">
                            <p x-show="activeCounsellor.phone"><strong>{% trans "Phone" %}:</strong> <a :href="'tel:' + activeCounsellor.phone.replaceAll(' ', '')" class="text-heading-blue hover:text-primary" x-text="activeCounsellor.phone"></a></p>
                            <p x-show="activeCounsellor.email"><strong>{% trans "Email" %}:</strong> <a :href="'mailto:' + activeCounsellor.email" class="text-heading-blue hover:text-primary" x-text="activeCounsellor.email"></a></p>
                        </div>

                        <div class="mt-7 flex flex-wrap gap-3">
                            <button type="button" @click="openBooking(activeCounsellor.id)" class="rounded-full bg-primary px-6 py-2.5 text-xs font-bold uppercase tracking-wider text-white hover:bg-primary-dark">{% trans "Book me" %}</button>
                            <button type="button" @click="closeCounsellor()" class="rounded-full border border-gray-200 px-6 py-2.5 text-xs font-bold uppercase tracking-wider text-ink hover:border-primary hover:text-primary">{% trans "Close" %}</button>
                        </div>
                    </div>
                </div>
            </div>
        </template>
    </div>
</div>
