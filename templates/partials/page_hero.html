{% load i18n %}
<section class="relative overflow-hidden bg-[#222] text-white">
    <div class="absolute inset-0 opacity-25">
        <div class="absolute -right-20 -top-28 h-96 w-96 rounded-full border-[70px] border-primary"></div>
        <div class="absolute -bottom-24 left-12 h-72 w-72 rounded-full border-[45px] border-heading-blue"></div>
    </div>
    <div class="site-container relative py-14 sm:py-20 lg:py-24">
        <div class="[&_a]:text-gray-300 [&_a:hover]:text-primary [&_span]:text-gray-400">{% include "partials/breadcrumb.html" %}</div>
        <div class="mt-9 max-w-4xl">
            {% if eyebrow %}<span class="text-[11px] font-bold uppercase tracking-[.24em] text-primary">{{ eyebrow }}</span>{% endif %}
            <h1 class="mt-3 text-4xl font-bold leading-tight sm:text-5xl lg:text-6xl newspaper-heading">{{ page.title }}</h1>
            {% if page.excerpt %}<p class="mt-5 max-w-3xl text-base leading-relaxed text-gray-300 sm:text-lg">{{ page.excerpt }}</p>{% endif %}
        </div>
    </div>
</section>
