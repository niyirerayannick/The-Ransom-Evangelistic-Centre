<form method="post" class="space-y-5" novalidate id="counselling-request-form">
    {% csrf_token %}
    {% if form.non_field_errors %}
    <div class="rounded-xl border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700">{{ form.non_field_errors }}</div>
    {% endif %}
    <div class="grid gap-5 sm:grid-cols-2">
        {% for field in form %}
        <label class="{% if field.name == 'message' %}sm:col-span-2{% endif %} block text-xs font-bold uppercase tracking-wider text-gray-500">
            {{ field.label }}{% if field.field.required %} *{% endif %}
            {{ field }}
            {% for error in field.errors %}<span class="mt-1 block text-xs normal-case text-red-600">{{ error }}</span>{% endfor %}
        </label>
        {% endfor %}
    </div>
    <button type="submit" class="w-full rounded-full bg-primary px-8 py-3.5 text-xs font-bold uppercase tracking-wider text-white transition hover:bg-primary-dark sm:w-auto">
        {{ counselling_ui.submit_request }}
    </button>
</form>
