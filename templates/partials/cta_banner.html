<section class="relative overflow-hidden rounded-3xl bg-[#333] px-6 py-10 text-white shadow-xl sm:px-10 lg:flex lg:items-center lg:justify-between lg:gap-8">
    <div class="absolute -right-16 -top-20 h-64 w-64 rounded-full border-[45px] border-primary/30"></div>
    <div class="relative">
        <span class="text-[10px] font-bold uppercase tracking-[.22em] text-primary">{{ eyebrow }}</span>
        <h2 class="mt-2 text-2xl font-bold sm:text-3xl newspaper-heading">{{ title }}</h2>
        {% if text %}<p class="mt-3 max-w-2xl text-sm leading-relaxed text-gray-300">{{ text }}</p>{% endif %}
    </div>
    <a href="{{ button_url }}" class="relative mt-6 inline-flex shrink-0 rounded-full bg-primary px-7 py-3 text-xs font-bold transition hover:bg-primary-dark lg:mt-0">{{ button_text }}</a>
</section>
