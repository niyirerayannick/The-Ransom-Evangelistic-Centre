{% if eyebrow %}<span class="text-[10px] font-bold uppercase tracking-[.22em] text-primary">{{ eyebrow }}</span>{% endif %}
<h2 class="mt-2 text-3xl font-bold leading-tight text-ink sm:text-4xl newspaper-heading">{{ title }}</h2>
{% if text %}<p class="mt-4 max-w-2xl leading-relaxed text-gray-600">{{ text }}</p>{% endif %}
