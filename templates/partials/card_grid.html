<div class="grid gap-5 sm:grid-cols-2 lg:grid-cols-3">
    {% for card in cards %}
    <article class="rounded-2xl border border-gray-100 bg-white p-6 shadow-sm transition hover:-translate-y-1 hover:border-primary/40 hover:shadow-lg">
        <div class="flex h-12 w-12 items-center justify-center rounded-xl bg-primary/10 text-xl font-bold text-primary">{{ card.icon }}</div>
        <h3 class="mt-5 text-xl font-bold newspaper-heading">{{ card.title }}</h3>
        <p class="mt-3 text-sm leading-relaxed text-gray-600">{{ card.text }}</p>
    </article>
    {% endfor %}
</div>
