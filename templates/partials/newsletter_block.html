{% load i18n %}
<div class="bg-blue-700 bg-gradient-to-r from-blue-700 to-blue-900 text-white py-12 my-12 rounded-none">
    <div class="container-custom text-center">
        <h2 class="text-3xl font-bold mb-4">{% trans "Stay Updated" %}</h2>
        <p class="text-blue-200 mb-6 max-w-xl mx-auto">{% trans "Subscribe to our newsletter to receive the latest news and updates from The Ransom Evangelistic Centre." %}</p>
        <form action="{% url 'newsletter:subscribe' %}" method="post" class="flex flex-col sm:flex-row gap-3 max-w-md mx-auto">
            {% csrf_token %}
            <input type="email" name="email" placeholder="{% trans 'Your email address' %}" required class="flex-1 px-4 py-3 rounded-lg text-gray-900 placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-300">
            <button type="submit" class="px-6 py-3 bg-white text-blue-800 font-semibold rounded-lg hover:bg-blue-50 transition">{% trans "Subscribe" %}</button>
        </form>
    </div>
</div>
