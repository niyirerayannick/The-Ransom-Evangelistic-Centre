{% load i18n %}
<article class="group flex h-full flex-col overflow-hidden rounded-2xl border border-gray-100 bg-white shadow-sm ring-1 ring-black/[.02] transition duration-300 hover:-translate-y-1 hover:border-primary/30 hover:shadow-soft">
    <button type="button" class="block text-left" @click="openCounsellor({{ counsellor.id }})">
        <div class="relative aspect-[4/5] overflow-hidden bg-gradient-to-br from-primary/10 via-paper to-gray-200">
            {% if counsellor.photo_url %}
            <img src="{{ counsellor.photo_url }}" alt="{{ counsellor.name }}" class="h-full w-full object-cover object-top transition duration-500 group-hover:scale-105">
            {% else %}
            <div class="flex h-full items-center justify-center text-5xl font-bold text-primary/30 newspaper-heading">{{ counsellor.name|first }}</div>
            {% endif %}
            <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-black/20 to-transparent opacity-95"></div>
            <div class="absolute inset-x-0 bottom-0 p-5">
                <span class="mb-3 inline-flex rounded-full bg-white/90 px-3 py-1 text-[10px] font-bold uppercase tracking-[.18em] text-primary shadow-sm">{% trans "Therapist" %}</span>
                <p class="text-2xl font-bold leading-tight text-white newspaper-heading">{{ counsellor.name }}</p>
                <p class="mt-1 line-clamp-2 text-sm font-semibold leading-snug text-primary">{{ counsellor.role }}</p>
            </div>
        </div>
    </button>
    <div class="flex flex-1 flex-col p-6">
        <p class="line-clamp-4 flex-1 text-[15px] leading-7 text-gray-700">{{ counsellor.bio_plain|truncatechars:180 }}</p>
        <div class="mt-6 grid grid-cols-2 gap-3">
            <button type="button" @click="openCounsellor({{ counsellor.id }})" class="inline-flex min-h-11 items-center justify-center rounded-full border border-gray-200 bg-white px-4 py-2 text-[11px] font-bold uppercase tracking-wider text-ink transition hover:border-primary hover:bg-primary/5 hover:text-primary">
                {% trans "View more" %}
            </button>
            <button type="button" @click="openBooking({{ counsellor.id }})" class="inline-flex min-h-11 items-center justify-center rounded-full bg-primary px-4 py-2 text-[11px] font-bold uppercase tracking-wider text-white shadow-sm transition hover:bg-primary-dark">
                {% trans "Book me" %}
            </button>
        </div>
    </div>
</article>
